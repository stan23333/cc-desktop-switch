name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix, for example 1.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Build release assets
        shell: powershell
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version) {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          }

          $args = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts\New-Release.ps1",
            "-Version", $version,
            "-Build",
            "-TryInstaller",
            "-Repository", $env:GITHUB_REPOSITORY
          )

          if ($env:WINDOWS_CODESIGN_PFX_BASE64) {
            $args += "-CodeSign"
          }

          powershell @args
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Verify release signatures
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-ReleaseSignature.ps1 -File "release\CC-Desktop-Switch-v$env:RELEASE_VERSION-Windows-x64.exe"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-ReleaseSignature.ps1 -File "release\CC-Desktop-Switch-v$env:RELEASE_VERSION-Windows-Portable.zip"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-ReleaseSignature.ps1 -File "release\latest.json"
          $setup = "release\CC-Desktop-Switch-v$env:RELEASE_VERSION-Windows-Setup.exe"
          if (Test-Path -LiteralPath $setup) {
            powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-ReleaseSignature.ps1 -File $setup
          }

      - name: Ensure release tag for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: powershell
        run: |
          $tag = "v$env:RELEASE_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          cmd /c "git rev-parse -q --verify refs/tags/$tag >NUL 2>NUL"
          if ($LASTEXITCODE -ne 0) {
            git tag $tag
            git push origin $tag
          }

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:RELEASE_VERSION"
          $notesPath = "docs\release-notes-v$env:RELEASE_VERSION.md"
          $notes = "Windows release for CC Desktop Switch v$env:RELEASE_VERSION."
          if (Test-Path -LiteralPath $notesPath) {
            $notes = Get-Content -LiteralPath $notesPath -Raw -Encoding utf8
          }
          $assets = Get-ChildItem -LiteralPath "release" -File | ForEach-Object { $_.FullName }
          if (-not $assets) {
            throw "No release assets found."
          }

          cmd /c "gh release view $tag --repo $env:GITHUB_REPOSITORY >NUL 2>NUL"
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag @assets --repo $env:GITHUB_REPOSITORY --title "CC Desktop Switch $tag" --notes $notes --verify-tag
          }

  macos:
    name: macOS release
    runs-on: macos-latest
    needs: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS assets
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ -z "$version" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          arch="$(uname -m)"
          if [[ "$arch" == "x86_64" ]]; then
            release_arch="x64"
          else
            release_arch="$arch"
          fi

          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "RELEASE_ARCH=$release_arch" >> "$GITHUB_ENV"
          CCDS_VERSION="$version" ./macos/build-macos.sh

      - name: Smoke test macOS app bundle
        shell: bash
        run: |
          app_exe="dist/mac/CC Desktop Switch.app/Contents/MacOS/CC-Desktop-Switch"
          if [[ ! -x "$app_exe" ]]; then
            echo "App executable not found: $app_exe" >&2
            exit 1
          fi

          export HOME="$RUNNER_TEMP/ccds-home"
          mkdir -p "$HOME"
          "$app_exe" --server-only --port 19081 > "$RUNNER_TEMP/ccds-macos-smoke.log" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ok=0
          for _ in {1..60}; do
            if curl -fsS "http://127.0.0.1:19081/api/status" >/dev/null; then
              ok=1
              break
            fi
            sleep 1
          done

          if [[ "$ok" != "1" ]]; then
            cat "$RUNNER_TEMP/ccds-macos-smoke.log" >&2
            exit 1
          fi

      - name: Verify macOS packages
        shell: bash
        run: |
          pkg="dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.pkg"
          dmg="dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.dmg"

          test -f "$pkg"
          test -f "$dmg"
          pkgutil --expand "$pkg" "$RUNNER_TEMP/pkg-expanded"
          hdiutil verify "$dmg"

          (cd dist/mac && shasum -a 256 "CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.pkg" > "CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.pkg.sha256")
          (cd dist/mac && shasum -a 256 "CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.dmg" > "CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.dmg.sha256")

      - name: Upload macOS assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${RELEASE_VERSION}"
          assets=(
            "dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.pkg"
            "dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.pkg.sha256"
            "dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.dmg"
            "dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-${RELEASE_ARCH}.dmg.sha256"
          )
          gh release upload "$tag" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
