name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix, for example 1.0.20"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="${REF_NAME#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag for manual run
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          target_sha="$(git rev-parse HEAD)"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_sha" != "$target_sha" ]]; then
              echo "Tag $tag points to $tag_sha, but this workflow is building $target_sha." >&2
              echo "Run the workflow from the tagged commit or choose a new version." >&2
              exit 1
            fi
          else
            git tag "$tag"
            git push origin "$tag"
          fi

  build_windows:
    name: Build Windows x64
    runs-on: windows-latest
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install NSIS
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Build Windows release assets
        shell: powershell
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PFX_PASSWORD }}
        run: |
          $args = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts\New-Release.ps1",
            "-Version", $env:RELEASE_VERSION,
            "-OutputDir", "release-staging",
            "-Build",
            "-TryInstaller",
            "-SkipManifest",
            "-Repository", $env:GITHUB_REPOSITORY
          )

          if ($env:WINDOWS_CODESIGN_PFX_BASE64) {
            $args += "-CodeSign"
          }

          powershell @args
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $required = @(
            "release-staging\CC-Desktop-Switch-v$env:RELEASE_VERSION-Windows-x64.exe",
            "release-staging\CC-Desktop-Switch-v$env:RELEASE_VERSION-Windows-Portable.zip"
          )
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Required Windows artifact missing: $path"
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: release-staging/*
          if-no-files-found: error
          retention-days: 7

  build_macos:
    name: Build macOS arm64
    runs-on: macos-14
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS assets
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          arch="$(uname -m)"
          if [[ "$arch" != "arm64" ]]; then
            echo "Expected macOS arm64 runner, got: $arch" >&2
            exit 1
          fi

          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_ARCH=arm64" >> "$GITHUB_ENV"
          CCDS_VERSION="$RELEASE_VERSION" ./macos/build-macos.sh

      - name: Smoke test macOS app bundle
        shell: bash
        run: |
          app_exe="dist/mac/CC Desktop Switch.app/Contents/MacOS/CC-Desktop-Switch"
          if [[ ! -x "$app_exe" ]]; then
            echo "App executable not found: $app_exe" >&2
            exit 1
          fi

          export HOME="$RUNNER_TEMP/ccds-home"
          mkdir -p "$HOME"
          "$app_exe" --server-only --port 19081 > "$RUNNER_TEMP/ccds-macos-smoke.log" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          ok=0
          for _ in {1..60}; do
            if curl -fsS "http://127.0.0.1:19081/api/ready" >/dev/null; then
              ok=1
              break
            fi
            sleep 1
          done

          if [[ "$ok" != "1" ]]; then
            cat "$RUNNER_TEMP/ccds-macos-smoke.log" >&2
            exit 1
          fi

      - name: Verify macOS packages
        shell: bash
        run: |
          pkg="dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-arm64.pkg"
          dmg="dist/mac/CC-Desktop-Switch-v${RELEASE_VERSION}-macOS-arm64.dmg"

          test -f "$pkg"
          test -f "$dmg"
          pkgutil --expand "$pkg" "$RUNNER_TEMP/pkg-expanded"
          hdiutil verify "$dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: |
            dist/mac/CC-Desktop-Switch-v${{ needs.prepare.outputs.version }}-macOS-arm64.pkg
            dist/mac/CC-Desktop-Switch-v${{ needs.prepare.outputs.version }}-macOS-arm64.dmg
          if-no-files-found: error
          retention-days: 7

  publish_release:
    name: Publish release
    runs-on: windows-latest
    needs:
      - prepare
      - build_windows
      - build_macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-staging
          merge-multiple: true

      - name: Generate manifest and signatures
        shell: powershell
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          $notesPath = "docs\release-notes-v$env:RELEASE_VERSION.md"
          $args = @(
            "-NoProfile",
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts\New-ReleaseManifest.ps1",
            "-Version", $env:RELEASE_VERSION,
            "-StagingDir", "release-staging",
            "-Repository", $env:GITHUB_REPOSITORY,
            "-RequiredPlatforms", "windows-x64", "macos-arm64"
          )
          if (Test-Path -LiteralPath $notesPath) {
            $args += @("-NotesFile", $notesPath)
          }

          powershell @args
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify release signatures
        shell: powershell
        run: |
          $publicKey = "release-staging\CC-Desktop-Switch-release-public.pem"
          $files = Get-ChildItem -LiteralPath "release-staging" -File |
            Where-Object {
              $_.Name -ne "CC-Desktop-Switch-release-public.pem" -and
              $_.Name -notlike "*.sha256" -and
              $_.Name -notlike "*.sig"
            }

          foreach ($file in $files) {
            powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-ReleaseSignature.ps1 -File $file.FullName -PublicKey $publicKey
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          function Invoke-Gh {
            gh @args
            if ($LASTEXITCODE -ne 0) {
              throw "gh $($args -join ' ') failed with exit code $LASTEXITCODE"
            }
          }

          $tag = $env:RELEASE_TAG
          $notesPath = "docs\release-notes-v$env:RELEASE_VERSION.md"
          $notesFile = Join-Path $env:RUNNER_TEMP "release-notes.md"
          if (Test-Path -LiteralPath $notesPath) {
            Copy-Item -LiteralPath $notesPath -Destination $notesFile -Force
          } else {
            Set-Content -LiteralPath $notesFile -Value "Release for CC Desktop Switch v$env:RELEASE_VERSION." -Encoding utf8
          }

          $isDraft = gh release view $tag --repo $env:GITHUB_REPOSITORY --json isDraft --jq ".isDraft" 2>$null
          if ($LASTEXITCODE -eq 0) {
            if ($isDraft.Trim() -ne "true") {
              throw "Release $tag already exists and is not a draft."
            }
            Invoke-Gh release edit $tag --repo $env:GITHUB_REPOSITORY --title "CC Desktop Switch $tag" --notes-file $notesFile --verify-tag
          } else {
            Invoke-Gh release create $tag --repo $env:GITHUB_REPOSITORY --draft --title "CC Desktop Switch $tag" --notes-file $notesFile --verify-tag
          }

          $existingAssetsText = gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq ".assets[].name" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $existingAssets = $existingAssetsText -split "\r?\n"
            foreach ($asset in $existingAssets) {
              if ($asset) {
                Invoke-Gh release delete-asset $tag $asset --repo $env:GITHUB_REPOSITORY --yes
              }
            }
          }

          $assets = Get-ChildItem -LiteralPath "release-staging" -File | Sort-Object Name | ForEach-Object { $_.FullName }
          if (-not $assets) {
            throw "No release assets found."
          }

          Invoke-Gh release upload $tag @assets --repo $env:GITHUB_REPOSITORY --clobber
          Invoke-Gh release edit $tag --repo $env:GITHUB_REPOSITORY --draft=false --latest --verify-tag
